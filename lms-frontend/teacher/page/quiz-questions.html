<style>
  .tqq-wrap {
    display: grid;
    gap: 1rem;
  }

  .tqq-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .tqq-toolbar-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tqq-btn-primary {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tqq-btn-primary:hover {
    background: var(--primary-light);
  }

  .tqq-btn-secondary {
    background: #f1f5f9;
    color: #0f172a;
    border: 1px solid #cbd5e1;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tqq-btn-secondary:hover {
    background: #e2e8f0;
  }

  .tqq-btn-danger {
    background: #dc2626;
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .tqq-note {
    border-radius: 10px;
    padding: 0.7rem 0.8rem;
    font-size: 0.82rem;
    display: none;
  }

  .tqq-note.show {
    display: block;
  }

  .tqq-note.success {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .tqq-note.error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .tqq-grid {
    display: grid;
    grid-template-columns: 1.1fr 1.4fr;
    gap: 1rem;
    align-items: start;
  }

  .tqq-field {
    display: grid;
    gap: 0.3rem;
  }

  .tqq-field label {
    font-size: 0.74rem;
    color: #475569;
    font-weight: 600;
  }

  .tqq-field input,
  .tqq-field select,
  .tqq-field textarea {
    border: 1px solid #dbe4ef;
    border-radius: 8px;
    padding: 0.5rem 0.65rem;
    font-size: 0.84rem;
    background: #fff;
  }

  .tqq-field textarea {
    min-height: 90px;
    resize: vertical;
  }

  .tqq-field input:focus,
  .tqq-field select:focus,
  .tqq-field textarea:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .tqq-form-grid {
    display: grid;
    gap: 0.75rem;
  }

  .tqq-form-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.65rem;
  }

  .tqq-options {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 0.75rem;
    background: #f8fafc;
    display: grid;
    gap: 0.6rem;
  }

  .tqq-options-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.6rem;
  }

  .tqq-list {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }

  .tqq-list-head {
    display: grid;
    grid-template-columns: 0.55fr 2.4fr 0.9fr 0.8fr 1fr;
    gap: 0.45rem;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 0.6rem 0.75rem;
    font-size: 0.74rem;
    color: #475569;
    font-weight: 700;
  }

  .tqq-row {
    display: grid;
    grid-template-columns: 0.55fr 2.4fr 0.9fr 0.8fr 1fr;
    gap: 0.45rem;
    align-items: center;
    padding: 0.62rem 0.75rem;
    border-bottom: 1px solid #f1f5f9;
    cursor: grab;
    transition: background 0.15s;
  }

  .tqq-row:hover {
    background: #f8fafc;
  }

  .tqq-row.dragging {
    opacity: 0.65;
    background: #eff6ff;
  }

  .tqq-row:last-child {
    border-bottom: none;
  }

  .tqq-title {
    display: grid;
    gap: 0.2rem;
  }

  .tqq-title strong {
    font-size: 0.85rem;
    color: #0f172a;
  }

  .tqq-title span {
    font-size: 0.73rem;
    color: #64748b;
  }

  .tqq-chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    width: fit-content;
  }

  .tqq-chip.draft {
    background: #f1f5f9;
    color: #475569;
  }

  .tqq-chip.active {
    background: #dcfce7;
    color: #166534;
  }

  .tqq-actions {
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .tqq-icon {
    border: none;
    background: none;
    border-radius: 6px;
    padding: 0.28rem 0.46rem;
    font-size: 0.83rem;
    cursor: pointer;
    color: #0f172a;
  }

  .tqq-icon:hover {
    background: #f1f5f9;
  }

  .tqq-icon.danger:hover {
    background: #fee2e2;
    color: #991b1b;
  }

  .tqq-muted {
    color: #64748b;
    font-size: 0.82rem;
  }

  .tqq-empty,
  .tqq-loading {
    padding: 1.1rem;
    text-align: center;
    color: #64748b;
    font-size: 0.84rem;
  }

  .tqq-details {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    padding: 0.8rem;
    display: none;
    gap: 0.55rem;
  }

  .tqq-details.show {
    display: grid;
  }

  .tqq-details h4 {
    margin: 0;
    color: #0f172a;
    font-size: 0.9rem;
  }

  .tqq-details p {
    margin: 0;
    font-size: 0.82rem;
    color: #334155;
  }

  @media (max-width: 980px) {
    .tqq-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    .tqq-form-row,
    .tqq-options-grid,
    .tqq-list-head,
    .tqq-row {
      grid-template-columns: 1fr;
    }

    .tqq-actions {
      justify-content: flex-start;
    }
  }
</style>

<div id="teacherQuizQuestionsRoot" class="tqq-wrap">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-list-check"></i> Quiz Questions</h3>
    </div>
    <div class="card-body">
      <div class="tqq-toolbar">
        <div>
          <p id="quizQuestionsSubtitle" class="tqq-muted" style="margin: 0">
            Loading quiz...
          </p>
        </div>
        <div class="tqq-toolbar-actions">
          <button
            id="quizQuestionsBackBtn"
            class="tqq-btn-secondary"
            type="button"
          >
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <button
            id="quizQuestionsPreviewBtn"
            class="tqq-btn-secondary"
            type="button"
          >
            <i class="fas fa-eye"></i> Preview
          </button>
          <button
            id="quizQuestionsPublishBtn"
            class="tqq-btn-primary"
            type="button"
          >
            <i class="fas fa-paper-plane"></i> Publish
          </button>
          <button
            id="quizQuestionsResultsBtn"
            class="tqq-btn-secondary"
            type="button"
          >
            <i class="fas fa-chart-line"></i> Results
          </button>
          <button
            id="quizQuestionsExportBtn"
            class="tqq-btn-secondary"
            type="button"
          >
            <i class="fas fa-file-csv"></i> Export Results
          </button>
        </div>
      </div>

      <div
        id="quizQuestionsNotice"
        class="tqq-note"
        role="status"
        aria-live="polite"
      ></div>

      <div class="tqq-grid">
        <div class="card">
          <div class="card-header">
            <h3 style="font-size: 0.95rem">
              <i class="fas fa-plus-circle"></i> Create / Edit Question
            </h3>
          </div>
          <div class="card-body">
            <form id="quizQuestionForm" class="tqq-form-grid">
              <input id="questionId" type="hidden" />

              <div class="tqq-field">
                <label for="questionText">Question Text</label>
                <textarea id="questionText" required></textarea>
              </div>

              <div class="tqq-form-row">
                <div class="tqq-field">
                  <label for="questionType">Question Type</label>
                  <select id="questionType" required>
                    <option value="multiple_choice">Multiple Choice</option>
                    <option value="true_false">True/False</option>
                    <option value="short_answer">Short Answer</option>
                    <option value="essay">Essay</option>
                  </select>
                </div>
                <div class="tqq-field">
                  <label for="questionPoints">Points</label>
                  <input id="questionPoints" type="number" min="1" value="1" />
                </div>
              </div>

              <div class="tqq-form-row">
                <div class="tqq-field">
                  <label for="questionDifficulty">Difficulty</label>
                  <select id="questionDifficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                  </select>
                </div>
                <div class="tqq-field">
                  <label for="questionImage">Question Image (optional)</label>
                  <input id="questionImage" type="file" accept="image/*" />
                  <small
                    id="questionImageCurrent"
                    class="tqq-muted"
                    style="display: none"
                  ></small>
                </div>
              </div>

              <div id="questionOptionsBlock" class="tqq-options">
                <div class="tqq-field">
                  <label>Options (A, B, C, D)</label>
                  <div class="tqq-options-grid">
                    <input
                      id="questionOptionA"
                      type="text"
                      maxlength="500"
                      placeholder="Option A"
                    />
                    <input
                      id="questionOptionB"
                      type="text"
                      maxlength="500"
                      placeholder="Option B"
                    />
                    <input
                      id="questionOptionC"
                      type="text"
                      maxlength="500"
                      placeholder="Option C"
                    />
                    <input
                      id="questionOptionD"
                      type="text"
                      maxlength="500"
                      placeholder="Option D"
                    />
                  </div>
                </div>
                <div class="tqq-field">
                  <label for="questionCorrectOption">Correct Option</label>
                  <select id="questionCorrectOption">
                    <option value="">Select correct option</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                  </select>
                </div>
              </div>

              <div
                id="questionTrueFalseBlock"
                class="tqq-options"
                style="display: none"
              >
                <div class="tqq-field">
                  <label>Correct Answer</label>
                  <div
                    style="
                      display: flex;
                      gap: 1rem;
                      align-items: center;
                      flex-wrap: wrap;
                    "
                  >
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 0.4rem;
                        margin: 0;
                        font-weight: 500;
                        color: #334155;
                      "
                    >
                      <input
                        type="radio"
                        name="questionTrueFalse"
                        id="questionTrueValue"
                        value="true"
                      />
                      True
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 0.4rem;
                        margin: 0;
                        font-weight: 500;
                        color: #334155;
                      "
                    >
                      <input
                        type="radio"
                        name="questionTrueFalse"
                        id="questionFalseValue"
                        value="false"
                      />
                      False
                    </label>
                  </div>
                </div>
              </div>

              <div id="questionCorrectAnswerField" class="tqq-field">
                <label for="questionCorrectAnswer"
                  >Correct Answer (for non-multiple-choice)</label
                >
                <input id="questionCorrectAnswer" type="text" maxlength="500" />
              </div>

              <div class="tqq-field">
                <label for="questionExplanation">Explanation (optional)</label>
                <textarea id="questionExplanation"></textarea>
              </div>

              <div
                style="display: flex; justify-content: flex-end; gap: 0.5rem"
              >
                <button
                  id="questionResetBtn"
                  type="button"
                  class="tqq-btn-secondary"
                >
                  Clear
                </button>
                <button
                  id="questionSubmitBtn"
                  type="submit"
                  class="tqq-btn-primary"
                >
                  Add Question
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3 style="font-size: 0.95rem">
              <i class="fas fa-database"></i> Question Bank
            </h3>
          </div>
          <div class="card-body" style="padding: 0">
            <div class="tqq-list">
              <div class="tqq-list-head">
                <div>#</div>
                <div>Question</div>
                <div>Type</div>
                <div>Points</div>
                <div>Actions</div>
              </div>
              <div id="questionListBody">
                <div class="tqq-loading">Loading questions...</div>
              </div>
            </div>
            <div id="questionDetails" class="tqq-details"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
