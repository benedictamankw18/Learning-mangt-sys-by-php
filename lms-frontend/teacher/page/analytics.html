<!-- Teacher Analytics -->
<style>
  .analytics-page { padding: 20px; }
  .analytics-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .analytics-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
  @media (max-width:900px){ .analytics-grid{grid-template-columns:1fr} }
  .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 6px 18px rgba(2,6,23,0.06);border:1px solid #e6eef5}
  .card h4{margin:0 0 8px 0;font-size:1rem}
  .chart-wrap{height:320px}
</style>

<div id="teacherAnalyticsRoot" class="analytics-page">
  <div class="analytics-header">
    <div>
      <h2 style="margin:0">Class & Student Analytics</h2>
      <p style="margin:4px 0 0;color:#64748b">Quick overview of class performance, trends and student progress.</p>
    </div>
    <div>
      <button id="taRefresh" class="btn btn-outline btn-sm">Refresh</button>
    </div>
  </div>

  <div class="analytics-grid">
    <div class="card">
      <h4>Class Performance (Average Scores)</h4>
      <div class="chart-wrap"><canvas id="analyticsClassPerformanceChart"></canvas></div>
    </div>

    <div class="card">
      <h4>Subject Trends (Last 6 Assessments)</h4>
      <div class="chart-wrap"><canvas id="subjectTrendsChart"></canvas></div>
    </div>

    <div class="card">
      <h4>Student Progress (Sample Student)</h4>
      <div class="chart-wrap"><canvas id="studentProgressChart"></canvas></div>
    </div>

    <div class="card">
      <h4>Assignment Submission Rate</h4>
      <div id="submissionRateContainer" style="padding:8px">Loading...</div>
    </div>
  </div>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
