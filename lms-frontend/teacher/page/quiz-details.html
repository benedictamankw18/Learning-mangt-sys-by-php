<style>
  .tqd-wrap {
    display: grid;
    gap: 1rem;
  }

  .tqd-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .tqd-toolbar-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tqd-note {
    border-radius: 10px;
    padding: 0.7rem 0.8rem;
    font-size: 0.82rem;
    display: none;
  }

  .tqd-note.show {
    display: block;
  }

  .tqd-note.success {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .tqd-note.error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .tqd-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tqd-btn-primary {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tqd-btn-primary:hover {
    background: var(--primary-light);
  }

  .tqd-btn-secondary {
    background: #f1f5f9;
    color: #0f172a;
    border: 1px solid #cbd5e1;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tqd-btn-secondary:hover {
    background: #e2e8f0;
  }

  .tqd-chip {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    border-radius: 999px;
    padding: 0.2rem 0.55rem;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: capitalize;
  }

  .tqd-chip.draft {
    background: #f1f5f9;
    color: #475569;
  }

  .tqd-chip.active {
    background: #dcfce7;
    color: #166534;
  }

  .tqd-chip.archived {
    background: #fee2e2;
    color: #991b1b;
  }

  .tqd-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem;
  }

  .tqd-info-item {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    background: #fff;
  }

  .tqd-info-item small {
    display: block;
    color: #64748b;
    font-size: 0.73rem;
    margin-bottom: 0.3rem;
  }

  .tqd-info-item strong {
    color: #0f172a;
    font-size: 0.88rem;
  }

  .tqd-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 0.75rem;
  }

  .tqd-stat {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 0.8rem 0.9rem;
    background: #fff;
  }

  .tqd-stat h4 {
    margin: 0;
    font-size: 1rem;
    color: #0f172a;
  }

  .tqd-stat p {
    margin: 0.2rem 0 0;
    font-size: 0.77rem;
    color: #64748b;
  }

  .tqd-table-card {
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    background: #fff;
    overflow: hidden;
  }

  .tqd-table-scroll {
    overflow-x: auto;
  }

  .tqd-table-head,
  .tqd-table-row {
    display: grid;
    gap: 0.45rem;
    min-width: 980px;
    align-items: center;
    padding: 0.62rem 0.75rem;
  }

  .tqd-table-head {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    font-size: 0.74rem;
    color: #475569;
    font-weight: 700;
  }

  .tqd-questions-head,
  .tqd-questions-row {
    grid-template-columns: 0.55fr 3fr 1.1fr 0.8fr 0.8fr;
  }

  .tqd-results-head,
  .tqd-results-row {
    grid-template-columns: 2fr 0.8fr 0.8fr 0.8fr 1fr 1.1fr;
  }

  .tqd-table-row {
    border-bottom: 1px solid #f1f5f9;
    font-size: 0.83rem;
    color: #334155;
  }

  .tqd-table-row:last-child {
    border-bottom: none;
  }

  .tqd-empty,
  .tqd-loading {
    padding: 1rem;
    color: #64748b;
    font-size: 0.84rem;
    text-align: center;
  }

  .tqd-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    z-index: 2300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .tqd-modal-overlay.open {
    display: flex;
  }

  .tqd-modal {
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    overflow-y: auto;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
  }

  .tqd-modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid #e2e8f0;
  }

  .tqd-modal-head h3 {
    margin: 0;
    font-size: 1rem;
    color: #0f172a;
  }

  .tqd-modal-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: #f1f5f9;
    color: #475569;
    cursor: pointer;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tqd-modal-body {
    padding: 1rem 1.2rem;
    display: grid;
    gap: 0.7rem;
  }

  .tqd-preview-item {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 0.7rem 0.8rem;
    background: #fff;
    display: grid;
    gap: 0.65rem;
  }

  .tqd-preview-item strong {
    color: #0f172a;
    display: block;
    margin-bottom: 0.2rem;
  }

  .tqd-preview-top {
    display: grid;
    gap: 0.25rem;
  }

  .tqd-preview-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: #475569;
  }

  .tqd-preview-meta span {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 0.15rem 0.55rem;
  }

  .tqd-preview-image-wrap {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
    background: #f8fafc;
    max-width: 520px;
  }

  .tqd-preview-image {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  .tqd-preview-options {
    display: grid;
    gap: 0.4rem;
  }

  .tqd-preview-option {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 0.45rem 0.55rem;
    color: #334155;
    font-size: 0.82rem;
    background: #fff;
  }

  .tqd-preview-option.is-selected {
    border-color: #16a34a;
    background: #f0fdf4;
  }

  .tqd-preview-option input {
    accent-color: #16a34a;
  }

  .tqd-preview-option-label {
    font-weight: 700;
    color: #0f172a;
  }

  .tqd-preview-answer {
    font-size: 0.82rem;
    color: #334155;
  }

  .tqd-preview-explanation {
    border-left: 3px solid #e2e8f0;
    padding-left: 0.6rem;
  }

  .tqd-preview-explanation p {
    margin: 0.2rem 0 0;
    font-size: 0.82rem;
    color: #475569;
    white-space: pre-wrap;
  }

  @media (max-width: 768px) {
    .tqd-info-grid,
    .tqd-stats {
      grid-template-columns: 1fr;
    }

    .tqd-actions {
      justify-content: flex-start;
    }
  }
</style>

<div id="teacherQuizDetailsRoot" class="tqd-wrap">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-file-circle-question"></i> Quiz Details</h3>
    </div>
    <div class="card-body">
      <div class="tqd-toolbar">
        <div>
          <p
            id="quizDetailsSubtitle"
            style="margin: 0; color: #64748b; font-size: 0.84rem"
          >
            Loading quiz...
          </p>
        </div>
        <div class="tqd-toolbar-actions">
          <button
            id="quizDetailsBackBtn"
            class="tqd-btn-secondary"
            type="button"
          >
            <i class="fas fa-arrow-left"></i> Back to Quizzes
          </button>
        </div>
      </div>

      <div
        id="quizDetailsNotice"
        class="tqd-note"
        role="status"
        aria-live="polite"
      ></div>

      <div id="quizInfoGrid" class="tqd-info-grid"></div>

      <div class="tqd-actions">
        <button id="quizPreviewBtn" class="tqd-btn-secondary" type="button">
          <i class="fas fa-eye"></i> Preview Quiz
        </button>
        <button id="quizPublishToggleBtn" class="tqd-btn-primary" type="button">
          <i class="fas fa-paper-plane"></i> Publish Quiz
        </button>
        <button
          id="quizExportQuestionsPdfBtn"
          class="tqd-btn-secondary"
          type="button"
        >
          <i class="fas fa-file-pdf"></i> Export Questions PDF
        </button>
        <button
          id="quizExportResultsPdfBtn"
          class="tqd-btn-secondary"
          type="button"
        >
          <i class="fas fa-file-pdf"></i> Export Results PDF
        </button>
        <button
          id="quizExportResultsCsvBtn"
          class="tqd-btn-secondary"
          type="button"
        >
          <i class="fas fa-file-csv"></i> Export Results CSV
        </button>
      </div>
    </div>
  </div>

  <div class="tqd-stats" id="quizStats"></div>

  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-list-check"></i> Question List</h3>
    </div>
    <div class="card-body" style="padding: 0">
      <div class="tqd-table-card">
        <div class="tqd-table-scroll">
          <div class="tqd-table-head tqd-questions-head">
            <div>#</div>
            <div>Question</div>
            <div>Type</div>
            <div>Points</div>
            <div>Difficulty</div>
          </div>
          <div id="quizQuestionsBody">
            <div class="tqd-loading">Loading questions...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-chart-line"></i> Results and Analytics</h3>
    </div>
    <div class="card-body" style="padding: 0">
      <div class="tqd-table-card">
        <div class="tqd-table-scroll">
          <div class="tqd-table-head tqd-results-head">
            <div>Student</div>
            <div>Attempt</div>
            <div>Status</div>
            <div>Score</div>
            <div>Percent</div>
            <div>Submitted At</div>
          </div>
          <div id="quizResultsBody">
            <div class="tqd-loading">Loading results...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="quizPreviewModal" class="tqd-modal-overlay" aria-hidden="true">
  <div class="tqd-modal">
    <div class="tqd-modal-head">
      <h3 id="quizPreviewTitle">Quiz Preview</h3>
      <button
        id="quizPreviewCloseBtn"
        class="tqd-modal-close"
        type="button"
        aria-label="Close"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="quizPreviewBody" class="tqd-modal-body"></div>
  </div>
</div>
