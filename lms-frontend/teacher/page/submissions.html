<style>
  /* ── Root & Globals ────────────────────────────────────── */
  :root {
    --primary: #6366f1;
    --primary-light: #ede9fe;
    --success: #16a34a;
    --warning: #ca8a04;
    --white: #fff;
    --bg: #f8fafc;
    --line: #e2e8f0;
    --text: #0f172a;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-900: #0f172a;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07);
    --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
    --border-radius: 8px;
    --border-radius-lg: 12px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Layout ────────────────────────────────────────────── */
  .sub-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ── Header ────────────────────────────────────────────– */
  .sub-header {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
    background: var(--white);
    padding: 1.5rem;
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: space-between;
  }

  .sub-header-left {
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  .sub-header-actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .sub-back-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.4rem 0.75rem;
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .sub-back-btn:hover {
    background: var(--primary-light);
    color: #f8fafc;
  }

  .sub-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gray-900);
    margin: 0;
  }

  /* ── Error Banner ──────────────────────────────────────── */
  .sub-error-banner {
    background: #fee2e2;
    color: #991b1b;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    margin-bottom: 1rem;
    font-size: 0.875rem;
    border: 1px solid #fecaca;
    display: none;
  }

  .sub-error-banner.show {
    display: block;
  }

  .sub-success-banner {
    background: #dcfce7;
    color: #16a34a;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    margin-bottom: 1rem;
    font-size: 0.875rem;
    border: 1px solid #bbf7d0;
    display: none;
  }

  .sub-success-banner.show {
    display: block;
  }

  /* ── Analytics Cards ───────────────────────────────────── */
  .sub-analytics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .sub-stat-card {
    background: var(--white);
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 1.25rem;
    border-left: 4px solid var(--primary);
  }

  .sub-stat-label {
    font-size: 0.75rem;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .sub-stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gray-900);
  }

  .sub-stat-card.warning {
    border-left-color: var(--warning);
  }

  .sub-stat-card.warning .sub-stat-value {
    color: var(--warning);
  }

  /* ── Cards ────────────────────────────────────────────– */
  .sub-card {
    background: var(--white);
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    overflow: hidden;
  }

  .sub-card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--line);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gray-600);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .sub-card-body {
    padding: 1.25rem;
  }

  /* ── Table ────────────────────────────────────────────– */
  .sub-data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  .sub-data-table thead th {
    padding: 0.65rem 1rem;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: #f8fafc;
    border-bottom: 1px solid var(--line);
  }

  .sub-data-table tbody tr {
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    transition: background 0.2s;
  }

  .sub-data-table tbody tr:last-child {
    border-bottom: none;
  }

  .sub-data-table tbody tr:hover {
    background: #f8fafc;
  }

  .sub-data-table tbody td {
    padding: 0.75rem 1rem;
  }

  /* ── Status Badges ────────────────────────────────────── */
  .sub-badge {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .sub-badge-submitted {
    background: #dcfce7;
    color: #16a34a;
  }

  .sub-badge-pending {
    background: #fef3c7;
    color: #92400e;
  }

  .sub-badge-graded {
    background: #dbeafe;
    color: #1e40af;
  }

  .sub-badge-late {
    background: #fee2e2;
    color: #991b1b;
  }

  /* ── Loading / Empty States ────────────────────────────– */
  .sub-spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }

  .sub-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: sub-spin 0.8s linear infinite;
  }

  @keyframes sub-spin {
    to {
      transform: rotate(360deg);
    }
  }

  .sub-empty {
    text-align: center;
    padding: 2rem;
    color: var(--gray-500);
    font-size: 0.875rem;
  }

  /* ── Buttons ───────────────────────────────────────────– */
  .sub-btn {
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--text);
    border-radius: var(--border-radius);
    padding: 0.6rem 1rem;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition:
      background 0.2s,
      border-color 0.2s;
  }

  .sub-btn:hover {
    background: #f1f5f9;
    border-color: var(--line);
  }

  .sub-btn-primary {
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
  }

  .sub-btn-primary:hover {
    background: #4f46e5;
    border-color: #4f46e5;
  }

  .sub-btn-success {
    background: var(--success);
    color: var(--white);
    border-color: var(--success);
  }

  .sub-btn-success:hover {
    background: #15803d;
    border-color: #15803d;
  }

  /* ── Modal ─────────────────────────────────────────────– */
  .sub-modal-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .sub-modal-backdrop.show {
    display: flex;
  }

  .sub-modal {
    background: var(--white);
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow-lg);
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    z-index: 1000;
  }

  .sub-modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sub-modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin: 0;
  }

  .sub-modal-close {
    background: none;
    border: none;
    color: var(--gray-500);
    cursor: pointer;
    font-size: 1.5rem;
    padding: 0;
    line-height: 1;
  }

  .sub-modal-close:hover {
    color: var(--text);
  }

  .sub-modal-body {
    padding: 1.5rem;
  }

  .sub-modal-footer {
    padding: 1.5rem;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
  }

  /* ── Form Elements ─────────────────────────────────────– */
  .sub-form-group {
    margin-bottom: 1.25rem;
  }

  .sub-form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--gray-900);
    margin-bottom: 0.5rem;
  }

  .sub-form-input,
  .sub-form-textarea {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--line);
    border-radius: var(--border-radius);
    font-size: 0.875rem;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s;
  }

  .sub-form-input:focus,
  .sub-form-textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  .sub-form-textarea {
    resize: vertical;
    min-height: 120px;
  }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 768px) {
    .sub-header {
      flex-direction: column;
      gap: 1rem;
    }

    .sub-header-actions {
      width: 100%;
      flex-wrap: wrap;
    }

    .sub-analytics {
      grid-template-columns: 1fr;
    }

    .sub-data-table {
      font-size: 0.75rem;
    }

    .sub-data-table th,
    .sub-data-table td {
      padding: 0.5rem;
    }

    .sub-modal {
      width: 95%;
      max-height: 95vh;
    }
  }
</style>

<script>
  /* ========================================
     Submissions Page Logic
     Initialized on page:loaded event
  ======================================== */
  (function () {
    "use strict";

    // Store current submissions data
    let submissionsData = [];
    let assignmentUuid = null;
    let currentModalSubmission = null;
    let assignmentMaxScore = null;

    // ─── Init ────────────────────────────────────────────────────────────
    function initSubmissionsPage() {
      setupBackButton();
      setupModalHandlers();
      setupActionButtons();

      assignmentUuid = getAssignmentUuid();
      if (!assignmentUuid) {
        showError(
          "No assignment selected. Please go back and select an assignment.",
        );
        return;
      }
      loadSubmissions(assignmentUuid);
    }

    // ─── Helpers ──────────────────────────────────────────────────────────
    function getAssignmentUuid() {
      const qs = new URLSearchParams(window.location.hash.split("?")[1] || "");
      return qs.get("assignment") || null;
    }

    function escHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function fmtDate(d) {
      if (!d) return "—";
      try {
        return new Date(d).toLocaleString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch (_) {
        return d;
      }
    }

    function getStatusBadge(status) {
      const s = String(status || "")
        .toLowerCase()
        .trim();
      if (s.includes("graded")) {
        return `<span class="sub-badge sub-badge-graded">Graded</span>`;
      } else if (s.includes("submitted")) {
        return `<span class="sub-badge sub-badge-submitted">Submitted</span>`;
      }
      return `<span class="sub-badge sub-badge-pending">Pending</span>`;
    }

    function isLateSubmission(submission, dueDate) {
      if (!submission.submitted_at || !dueDate) return false;
      const subDate = new Date(submission.submitted_at);
      const due = new Date(dueDate);
      return subDate > due;
    }

    function sanitizeName(value, fallback) {
      const cleaned = String(value || "")
        .trim()
        .replace(/[^a-zA-Z0-9_-]+/g, "_")
        .replace(/^_+|_+$/g, "");
      return cleaned || fallback;
    }

    function sanitizeFilenamePreserveExt(filename) {
      const raw = String(filename || "").trim();
      if (!raw) return "file";

      const dotIndex = raw.lastIndexOf(".");
      if (dotIndex <= 0 || dotIndex === raw.length - 1) {
        return sanitizeName(raw, "file");
      }

      const stem = raw.slice(0, dotIndex);
      const ext = raw.slice(dotIndex + 1).replace(/[^a-zA-Z0-9]+/g, "");
      const safeStem = sanitizeName(stem, "file");
      return ext ? `${safeStem}.${ext}` : safeStem;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function getSubmissionFileUrls(path) {
      const raw = String(path || "").trim();
      if (!raw) return [];
      if (/^https?:\/\//i.test(raw)) return [raw];

      const normalized = raw.replace(/^\/+/, "");
      const withUploadsPrefix = /^uploads\//i.test(normalized)
        ? normalized
        : `uploads/${normalized}`;

      const sameOrigin = `${window.location.origin.replace(/\/$/, "")}/${withUploadsPrefix}`;
      const apiOrigin = `${String(API_BASE_URL || "").replace(/\/$/, "")}/${withUploadsPrefix}`;

      return sameOrigin === apiOrigin ? [sameOrigin] : [sameOrigin, apiOrigin];
    }

    function getSubmittedFileName(path) {
      const raw = String(path || "").trim();
      if (!raw) return "-";

      const cleanPath = raw.split("?")[0].split("#")[0];
      const baseName =
        cleanPath.substring(cleanPath.lastIndexOf("/") + 1) || cleanPath;

      try {
        return decodeURIComponent(baseName) || "-";
      } catch (_) {
        return baseName || "-";
      }
    }

    function buildSubmissionArchiveFileName(index, studentCode, filePath) {
      const baseName = sanitizeFilenamePreserveExt(
        getSubmittedFileName(filePath),
      );
      return `${String(index + 1).padStart(3, "0")}_${studentCode}_${baseName}`;
    }

    function getSubmissionPrimaryId(submission) {
      if (!submission || typeof submission !== "object") return "";
      const candidates = [
        submission.submission_id,
        submission.id,
        submission.submissionId,
        submission.uuid,
      ];
      for (const value of candidates) {
        const id = String(value ?? "").trim();
        if (id) return id;
      }
      return "";
    }

    function applyGradeInputMax(maxScore) {
      const gradeInput = document.getElementById("subModalGradeInput");
      if (!gradeInput) return;

      const numericMax = Number(maxScore);
      if (Number.isFinite(numericMax) && numericMax > 0) {
        assignmentMaxScore = numericMax;
        gradeInput.setAttribute("max", String(numericMax));
      } else {
        assignmentMaxScore = null;
        gradeInput.removeAttribute("max");
      }
    }

    async function ensureJsZip() {
      if (window.JSZip) return window.JSZip;

      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src =
          "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        script.async = true;
        script.onload = resolve;
        script.onerror = () =>
          reject(new Error("Unable to load JSZip library."));
        document.head.appendChild(script);
      });

      if (!window.JSZip) {
        throw new Error("JSZip did not initialize.");
      }

      return window.JSZip;
    }

    async function ensureJsPdf() {
      if (window.jspdf && typeof window.jspdf.jsPDF === "function") {
        return window.jspdf.jsPDF;
      }

      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src =
          "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        script.async = true;
        script.onload = resolve;
        script.onerror = () =>
          reject(new Error("Unable to load jsPDF library."));
        document.head.appendChild(script);
      });

      if (!window.jspdf || typeof window.jspdf.jsPDF !== "function") {
        throw new Error("jsPDF did not initialize.");
      }

      return window.jspdf.jsPDF;
    }

    function toAbsoluteAssetUrl(path, baseOrigin) {
      const raw = String(path || "").trim();
      if (!raw || raw === "-") return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      const normalized = raw.replace(/^\/+/, "");
      const origin = String(baseOrigin || window.location.origin).replace(
        /\/$/,
        "",
      );
      return `${origin}/${normalized}`;
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () =>
          reject(new Error("Failed to convert blob to data URL"));
        reader.readAsDataURL(blob);
      });
    }

    function toApiUploadServeUrl(rawPath) {
      const source = String(rawPath || "").trim();
      if (!source || source === "-") return "";

      const apiBase = String(
        typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "",
      )
        .trim()
        .replace(/\/$/, "");
      if (!apiBase) return "";

      let pathOnly = source;
      if (/^https?:\/\//i.test(source)) {
        try {
          pathOnly = new URL(source).pathname;
        } catch (_) {
          pathOnly = source;
        }
      }

      const uploadsMarker = "/uploads/";
      const markerIndex = pathOnly.toLowerCase().indexOf(uploadsMarker);
      const relative =
        markerIndex >= 0
          ? pathOnly.slice(markerIndex + uploadsMarker.length)
          : pathOnly.replace(/^\/+/, "");

      const parts = relative.split("/").filter(Boolean);
      if (parts.length < 2) return "";

      const category = encodeURIComponent(parts[0]);
      if (parts.length === 2) {
        const filename = encodeURIComponent(parts[1]);
        return `${apiBase}/api/upload/${category}/${filename}`;
      }

      if (parts.length > 3) {
        return "";
      }

      const subdir = encodeURIComponent(parts[1]);
      const filename = encodeURIComponent(parts[2]);
      return `${apiBase}/api/upload/${category}/${subdir}/${filename}`;
    }

    async function loadInstitutionLogoDataUrl(logoUrl) {
      const apiBase = String(
        typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "",
      )
        .trim()
        .replace(/\/$/, "");
      const apiOrigin = apiBase ? apiBase.replace(/\/api$/i, "") : "";

      const candidates = [];
      const pushCandidate = (value) => {
        const v = String(value || "").trim();
        if (!v) return;
        if (!candidates.includes(v)) candidates.push(v);
      };

      // Prefer API-served upload path to avoid static /uploads CORS issues.
      pushCandidate(toApiUploadServeUrl(logoUrl));

      // Then try institution logo from frontend origin and API origin as fallback.
      pushCandidate(toAbsoluteAssetUrl(logoUrl, window.location.origin));
      if (apiOrigin) {
        pushCandidate(toAbsoluteAssetUrl(logoUrl, apiOrigin));
      }

      // Final fallback to frontend default logo.
      pushCandidate(
        toAbsoluteAssetUrl("/assets/img/logo.png", window.location.origin),
      );

      for (const candidate of candidates) {
        try {
          const res = await fetch(candidate, { credentials: "omit" });
          if (!res.ok) continue;
          const blob = await res.blob();
          if (
            !String(blob.type || "")
              .toLowerCase()
              .startsWith("image/")
          ) {
            continue;
          }
          const dataUrl = await blobToDataUrl(blob);
          if (dataUrl) return dataUrl;
        } catch (_) {
          // Try next fallback.
        }
      }

      return "";
    }

    function wrapForPdf(text, width = 95) {
      const normalized = String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .trim();

      if (!normalized) return ["-"];

      const lines = [];
      normalized.split("\n").forEach((line) => {
        let current = line;
        if (!current) {
          lines.push("");
          return;
        }

        while (current.length > width) {
          lines.push(current.slice(0, width));
          current = current.slice(width);
        }
        lines.push(current);
      });

      return lines;
    }

    function buildSimplePdfUint8(payload = {}) {
      if (!window.jspdf || typeof window.jspdf.jsPDF !== "function") {
        throw new Error("jsPDF is required for submission PDF export.");
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: "landscape",
        unit: "pt",
        format: "a4",
      });
      const firstPageWidth = doc.internal.pageSize.getWidth();
      const centerX = firstPageWidth / 2;
      const leftX = 40;
      const rightX = firstPageWidth - 40;
      const logoDataUrl = String(payload.logoDataUrl || "").trim();
      const institutionName =
        String(payload.institutionName || "-").trim() || "-";
      const institutionCode =
        String(payload.institutionCode || "-").trim() || "-";
      const studentName = String(payload.studentName || "-").trim() || "-";
      const studentIdNumber =
        String(payload.studentIdNumber || "-").trim() || "-";
      const submittedAt = String(payload.submittedAt || "-").trim() || "-";
      const scoreValue = payload.score;
      const maxScoreValue = payload.maxScore;
      const submissionTypeLabel =
        String(payload.submissionTypeLabel || "-").trim() || "-";
      const submittedFileName =
        String(payload.submittedFileName || "-").trim() || "-";
      const submittedFileLink =
        String(payload.submittedFileLink || "-").trim() || "-";
      const submissionTextLines = Array.isArray(payload.submissionTextLines)
        ? payload.submissionTextLines
        : [];
      const feedbackLines = Array.isArray(payload.feedbackLines)
        ? payload.feedbackLines
        : [];

      // Cover page
      if (logoDataUrl) {
        try {
          const logoSize = 86;
          const logoX = centerX - logoSize / 2;
          const logoY = 54;
          const logoFormat = /^data:image\/png/i.test(logoDataUrl)
            ? "PNG"
            : "JPEG";
          doc.addImage(
            logoDataUrl,
            logoFormat,
            logoX,
            logoY,
            logoSize,
            logoSize,
          );
        } catch (_) {
          // Continue without logo on cover if rendering fails.
        }
      }

      doc.setFont("helvetica", "bold");
      doc.setFontSize(48);
      doc.setTextColor(15, 23, 42);
      doc.text(institutionName, centerX, 210, { align: "center" });

      doc.setFont("helvetica", "bold");
      doc.setFontSize(30);
      doc.text(institutionCode, centerX, 258, { align: "center" });

      doc.setFont("helvetica", "bold");
      doc.setFontSize(20);
      doc.text(`Student Name: ${studentName}`, centerX, 340, {
        align: "center",
      });
      doc.text(`Student ID Number: ${studentIdNumber}`, centerX, 372, {
        align: "center",
      });
      doc.text(`Submitted At: ${submittedAt}`, centerX, 404, {
        align: "center",
      });

      // Next page (portrait)
      doc.addPage("a4", "portrait");
      const secondPageWidth = doc.internal.pageSize.getWidth();
      const leftXPage2 = 40;
      const rightXPage2 = secondPageWidth - 40;
      const hrWidth = rightXPage2 - leftXPage2;
      function drawHr(offsetY = 0) {
        const yy = y + offsetY;
        doc.setDrawColor(30, 41, 59);
        doc.setLineWidth(0.8);
        doc.line(leftXPage2, yy, leftXPage2 + hrWidth, yy);
      }
      doc.setFont("helvetica", "bold");
      doc.setFontSize(50);
      doc.setTextColor(15, 23, 42);
      const scoreText =
        scoreValue === null ||
        scoreValue === undefined ||
        String(scoreValue).trim() === ""
          ? "-"
          : `${scoreValue}/${
              maxScoreValue === null ||
              maxScoreValue === undefined ||
              String(maxScoreValue).trim() === ""
                ? "-"
                : maxScoreValue
            }`;
      doc.text(scoreText, rightXPage2, 70, { align: "right" });

      let y = 120;

      y += 1;
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(12);
      drawHr();
      y += 2;
      drawHr();
      y += 24;

      const lineGap = 28;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(30, 64, 175);
      const submissionTypeLabelText = "Submission Type:";
      doc.text(submissionTypeLabelText, leftXPage2, y);
      const submissionTypeLabelWidth = doc.getTextWidth(
        submissionTypeLabelText,
      );
      doc.setFont("helvetica", "normal");
      doc.setTextColor(30, 41, 59);
      doc.text(
        ` ${submissionTypeLabel}`,
        leftXPage2 + submissionTypeLabelWidth + 2,
        y,
      );
      doc.setFont("helvetica", "bold");
      doc.setTextColor(30, 64, 175);
      y += lineGap;
      const submittedFileNameLabelText = "Submitted File Name:";
      doc.text(submittedFileNameLabelText, leftXPage2, y);
      const submittedFileNameLabelWidth = doc.getTextWidth(
        submittedFileNameLabelText,
      );
      doc.setFont("helvetica", "normal");
      doc.setTextColor(30, 41, 59);
      doc.text(
        ` ${submittedFileName}`,
        leftXPage2 + submittedFileNameLabelWidth + 2,
        y,
      );
      doc.setFont("helvetica", "bold");
      doc.setTextColor(30, 64, 175);
      y += lineGap;

      const submittedFileLinkLabelText = "Submitted File Link:";
      doc.text(submittedFileLinkLabelText, leftXPage2, y);
      const submittedFileLinkLabelWidth = doc.getTextWidth(
        submittedFileLinkLabelText,
      );
      doc.setFont("helvetica", "normal");
      doc.setTextColor(30, 41, 59);
      const submittedFileLinkValueText = ` ${submittedFileLink}`;
      const submittedFileLinkValueX =
        leftXPage2 + submittedFileLinkLabelWidth + 2;
      doc.text(submittedFileLinkValueText, submittedFileLinkValueX, y);
      if (submittedFileLink !== "-") {
        const linkWidth = doc.getTextWidth(submittedFileLinkValueText);
        doc.link(submittedFileLinkValueX, y - 16, linkWidth, 18, {
          url: submittedFileLink,
        });
      }

      y += 22;
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(12);
      drawHr();
      y += 20;
      drawHr();
      y += 24;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(15);
      doc.text("Submission Text", leftXPage2, y);
      y += 20;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      drawHr();
      y += 22;

      const submissionText = submissionTextLines.length
        ? submissionTextLines.join("\n")
        : "-";
      const wrappedSubmission = doc.splitTextToSize(
        submissionText,
        rightXPage2 - leftXPage2,
      );
      wrappedSubmission.forEach((line) => {
        if (y > 760) {
          doc.addPage("a4", "portrait");
          y = 80;
        }
        doc.text(String(line), leftXPage2, y);
        y += 18;
      });

      y += 14;
      if (y > 740) {
        doc.addPage("a4", "portrait");
        y = 80;
      }
      drawHr();
      y += 22;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(15);
      doc.text("Feedback", leftXPage2, y);
      y += 20;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      drawHr();
      y += 22;

      const feedbackText = feedbackLines.length
        ? feedbackLines.join("\n")
        : "-";
      const wrappedFeedback = doc.splitTextToSize(
        feedbackText,
        rightXPage2 - leftXPage2,
      );
      wrappedFeedback.forEach((line) => {
        if (y > 760) {
          doc.addPage("a4", "portrait");
          y = 80;
        }
        doc.text(String(line), leftXPage2, y);
        y += 18;
      });

      return new Uint8Array(doc.output("arraybuffer"));
    }

    async function saveGrade() {
      if (!currentModalSubmission) return;

      const gradeInput = document.getElementById("subModalGradeInput");
      const feedbackEl = document.getElementById("subModalFeedback");
      const grade = gradeInput.value.trim();
      const feedback = feedbackEl.value.trim();

      if (!grade) {
        showError("Please enter a grade/score.");
        return;
      }

      if (assignmentMaxScore !== null) {
        const numericGrade = Number(grade);
        if (
          Number.isFinite(numericGrade) &&
          numericGrade > assignmentMaxScore
        ) {
          showError(
            `Score cannot be greater than max score (${assignmentMaxScore}).`,
          );
          return;
        }
      }

      const btn = document.getElementById("subModalSaveBtn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      try {
        if (!Auth || !Auth.isAuthenticated || !Auth.isAuthenticated()) {
          window.location.href = "/auth/login.html";
          return;
        }

        const payload = {
          score: grade,
          feedback: feedback,
          graded_at: new Date().toISOString(),
          status: "graded",
        };

        const submissionId = getSubmissionPrimaryId(currentModalSubmission);
        if (!submissionId) {
          showError("Unable to grade this submission due to missing ID.");
          return;
        }

        // Call API to save grade using SubmissionsAPI
        await SubmissionsAPI.gradeSubmission(submissionId, payload);

        currentModalSubmission.score = grade;
        currentModalSubmission.feedback = feedback;
        currentModalSubmission.status = "graded";

        showSuccess("Grade and feedback saved successfully.");
        closeModal();
        await loadSubmissions(assignmentUuid);
      } catch (err) {
        console.error("Save grade error:", err);
        showError("Failed to save grade. Please try again.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Save Grade & Feedback';
      }
    }

    async function downloadAllSubmissions() {
      if (!submissionsData.length) {
        showError("No submissions to download.");
        return;
      }

      const btn = document.getElementById("subDownloadBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Downloading...';

      try {
        if (!Auth || !Auth.isAuthenticated || !Auth.isAuthenticated()) {
          window.location.href = "/auth/login.html";
          return;
        }

        const JSZip = await ensureJsZip();
        await ensureJsPdf();
        const exportRes =
          await SubmissionsAPI.downloadAllSubmissions(assignmentUuid);
        const exportData = exportRes?.data || exportRes || {};
        const submissions = Array.isArray(exportData.submissions)
          ? exportData.submissions
          : submissionsData;

        const submissionType = String(
          exportData?.assignment?.submission_type || "both",
        )
          .toLowerCase()
          .trim();
        const assignmentTitle = String(
          exportData?.assignment?.title || assignmentUuid,
        ).trim();
        const institutionName = String(
          exportData?.assignment?.institution_name || "-",
        ).trim();
        const institutionCode = String(
          exportData?.assignment?.institution_code || "-",
        ).trim();
        const maxScore =
          exportData?.assignment?.max_score === null ||
          exportData?.assignment?.max_score === undefined
            ? null
            : exportData.assignment.max_score;
        const institutionLogoUrl = String(
          exportData?.assignment?.logo_url || "",
        ).trim();
        const institutionLogoDataUrl =
          await loadInstitutionLogoDataUrl(institutionLogoUrl);
        const includeSubmittedFiles =
          submissionType === "file" || submissionType === "both";

        const zip = new JSZip();
        const pdfFolder = zip.folder("student_pdf");
        const submittedFolder = includeSubmittedFiles
          ? zip.folder("submitted_file")
          : null;

        let addedCount = 0;
        for (let i = 0; i < submissions.length; i += 1) {
          const submission = submissions[i] || {};
          const studentCode = sanitizeName(
            submission.student_id_number,
            "student",
          );
          const submittedFileName = submission.submission_file
            ? buildSubmissionArchiveFileName(
                i,
                studentCode,
                submission.submission_file,
              )
            : "-";
          const submittedFileRelativePath =
            submittedFileName !== "-"
              ? `../submitted_file/${submittedFileName}`
              : "-";
          const studentName =
            submission.student_name ||
            [submission.first_name, submission.last_name]
              .filter(Boolean)
              .join(" ") ||
            "-";

          const submissionTypeLabel =
            submissionType === "both"
              ? "Upload file or/and Text Submission"
              : submissionType === "file"
                ? "Upload file"
                : submissionType === "text"
                  ? "Text Submission"
                  : submissionType || "-";

          const pdfName = `${String(i + 1).padStart(3, "0")}_${studentCode}_submission.pdf`;
          pdfFolder.file(
            pdfName,
            buildSimplePdfUint8({
              institutionName: institutionName || "-",
              institutionCode: institutionCode || "-",
              studentName,
              studentIdNumber: submission.student_id_number || "-",
              submittedAt: submission.submitted_at || "-",
              score: submission.score,
              maxScore,
              submissionTypeLabel,
              submittedFileName,
              submittedFileLink: submittedFileRelativePath,
              submissionTextLines: wrapForPdf(submission.submission_text || ""),
              feedbackLines: wrapForPdf(submission.feedback || ""),
              logoDataUrl: institutionLogoDataUrl,
            }),
          );
          addedCount += 1;

          if (submittedFolder && submission.submission_file) {
            const fileUrls = getSubmissionFileUrls(submission.submission_file);
            if (fileUrls.length) {
              let fileBlob = null;

              for (const fileUrl of fileUrls) {
                try {
                  const res = await fetch(fileUrl, {
                    credentials: "same-origin",
                  });
                  if (res.ok) {
                    fileBlob = await res.blob();
                    break;
                  }
                } catch (_) {
                  // Try next candidate URL.
                }
              }

              if (fileBlob) {
                const fileName = buildSubmissionArchiveFileName(
                  i,
                  studentCode,
                  submission.submission_file,
                );
                submittedFolder.file(fileName, fileBlob);
                addedCount += 1;
              } else {
                console.warn(
                  "Failed to fetch submission file for export:",
                  submission.submission_file,
                );
              }
            }
          }
        }

        if (addedCount === 0) {
          zip.file(
            "README.txt",
            `No submission files or text responses were found for assignment ${assignmentUuid}.\nGenerated At: ${new Date().toISOString()}`,
          );
        }

        const blob = await zip.generateAsync({ type: "blob" });
        downloadBlob(blob, `assignment_submissions_${assignmentUuid}.zip`);

        showSuccess("Submissions downloaded successfully.");
      } catch (err) {
        console.error("Download error:", err);
        showError(err?.message || "Failed to download submissions.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-download"></i> Download All';
      }
    }

    async function publishGrades() {
      if (!submissionsData.length) {

      const ungraded = submissionsData.filter((s) => !s.score);
      if (ungraded.length) {

      const btn = document.getElementById("subPublishBtn");

        await SubmissionsAPI.publishGrades(assignmentUuid);

        showSuccess(

      } catch (err) {

        showError("Failed to publish grades.");
      } finally {
        btn.disabled = false;

    }

    // ─── Analytics ────────────────────────────────────────────────────────

    // ─── Load Submissions ─────────────────────────────────────────────────

      const body = document.getElementById("subContentBody");

      try {
        if (!Auth || !Auth.isAuthenticated || !Auth.isAuthenticated()) {
          window.location.href = "/auth/login.html";
          return;
        }

        const res = await AssignmentAPI.getSubmissions(uuid);
        const submissions = Array.isArray(res?.submissions)
          ? res.submissions
          : Array.isArray(res?.data?.submissions)
            ? res.data.submissions
            : Array.isArray(res?.data)
              ? res.data
              : [];

        const maxScore =
          res?.max_score ??
          res?.data?.max_score ??
          res?.assignment?.max_score ??
          res?.data?.assignment?.max_score ??
          null;

        submissionsData = submissions;

          res?.due_date ||
          res?.data?.due_date ||
          res?.assignment?.due_date ||

          "<th>Submitted At</th>" +
          "<th>Late</th>" +

                '<td><button class="sub-btn" data-submission-id="' +
                escHtml(submissionId || "") +
                '" onclick="window.__subGradeBtn && window.__subGradeBtn(this)">Grade</button></td>' +
                "</tr>"
              );
            })
            .join("") +
          "</tbody>" +
          "</table>";

        // Attach click handlers to grade buttons
        window.__subGradeBtn = (btn) => {
          const submissionId = String(
            btn?.getAttribute("data-submission-id") || "",
          ).trim();
          const submission = submissions.find(
            (s) => getSubmissionPrimaryId(s) === submissionId,
          );
          if (submission) {
            openGradeModal(submission);
          } else {
            showError(
              "Unable to open this submission. Please refresh and try again.",
            );
          }
        };
      } catch (err) {
        console.error("Load submissions error:", err);
        showError("Failed to load submissions.");
      }
    }

    // ─── Error & Success States ───────────────────────────────────────────
    function showError(msg, type) {
      const banner = document.getElementById("subErrorBanner");
      if (banner) {
        banner.textContent = msg;
        banner.classList.add("show");
        setTimeout(() => banner.classList.remove("show"), 5000);
      }
      if (typeof showToast === "function") {
        showToast(msg, type || "error");
        return;
      }
      console.error((type || "error").toUpperCase() + ": " + msg);
    }

    function showSuccess(msg, type) {
      const banner = document.getElementById("subSuccessBanner");
      if (banner) {
        banner.textContent = msg;
        banner.classList.add("show");
        setTimeout(() => banner.classList.remove("show"), 5000);
      }
      if (typeof showToast === "function") {
        showToast(msg, type || "info");
        return;
      }
      console.log((type || "info").toUpperCase() + ": " + msg);
    }

    // ─── Start ────────────────────────────────────────────────────────────
    document.addEventListener("page:loaded", function (e) {
      if (e.detail && e.detail.page === "submissions") {
        initSubmissionsPage();
      }
    });
  })();
</script>
