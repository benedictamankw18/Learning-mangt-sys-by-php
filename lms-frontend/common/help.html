    let helpcurrentRole = 'teacher'; // Default
    let allContent = []; // For search

    function init() {
      helpcurrentRole = Auth.getUserRole();
      if (!helpcurrentRole) {
        window.location.href = '../auth/login.html';
        return;
      }

      // Map role names if needed (backend may use different casing)
      const roleMap = {
        'superadmin': 'superadmin',
        'super_admin': 'superadmin',
        'admin': 'admin',
        'teacher': 'teacher',
        'student': 'student',
        'parent': 'parent'
      };

      helpcurrentRole = roleMap[helpcurrentRole.toLowerCase()] || 'teacher';

      renderContent();
      setupEventListeners();
      switchTab(helpcurrentRole);
    }

    function renderContent() {
      const container = document.getElementById('helpContents');
      container.innerHTML = '';

      for (const [role, data] of Object.entries(window.HELP_CONTENT)) {
        const content = document.createElement('div');
        content.className = `help-content ${role === helpcurrentRole ? 'active' : ''}`;
        content.id = `content-${role}`;

        let html = '';

        // Guides Section
        html += '<div class="help-section">';
        html += '<h3 style="font-size: 1.2rem; color: #0f172a; margin: 0 0 1rem; font-weight: 700;"><i class="fas fa-book-open"></i> User Guides</h3>';
        data.guides.forEach((guide, idx) => {
          const contentId = `guide-${role}-${idx}`;
          html += `
            <div>
              <div class="help-section-title collapsed" onclick="toggleSection(this, '${contentId}')">
                <i class="fas fa-chevron-right"></i>
                <i class="fas ${guide.icon}"></i>
                <span>${guide.title}</span>
              </div>
              <div class="help-section-content" id="${contentId}">
                ${guide.content}
              </div>
            </div>
          `;
          allContent.push({ type: 'guide', text: guide.title.toLowerCase(), role });
        });
        html += '</div>';

        // FAQs Section
        html += '<div class="help-section" style="margin-top: 2rem;">';
        html += '<h3 style="font-size: 1.2rem; color: #0f172a; margin: 0 0 1rem; font-weight: 700;"><i class="fas fa-circle-question"></i> Frequently Asked Questions</h3>';
        html += '<div class="help-faq">';
        data.faqs.forEach((faq, idx) => {
          const faqId = `faq-${role}-${idx}`;
          html += `
            <div class="help-faq-item" id="${faqId}">
              <div class="help-faq-question" onclick="toggleFaq(this, '${faqId}')">
                <h4 class="help-faq-question-text">${faq.q}</h4>
                <i class="fas fa-chevron-down help-faq-icon"></i>
              </div>
              <div class="help-faq-answer">
                <p>${faq.a}</p>
              </div>
            </div>
          `;
          allContent.push({ type: 'faq', text: faq.q.toLowerCase(), role });
        });
        html += '</div>';
        html += '</div>';

        // Support section
        html += `
          <div class="help-support">
            <h3>Still need help?</h3>
            <p>Can't find what you're looking for? Contact our support team.</p>
            <a href="#support" class="help-support-btn">
              <i class="fas fa-headset"></i> Contact Support
            </a>
          </div>
        `;

        content.innerHTML = html;
        container.appendChild(content);
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('.help-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const role = tab.dataset.role;
          switchTab(role);
        });
      });

      document.getElementById('helpSearch').addEventListener('input', (e) => {
        filterContent(e.target.value);
      });
    }

    function switchTab(role) {
      // Update active tab
      document.querySelectorAll('.help-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.role === role);
      });

      // Update active content
      document.querySelectorAll('.help-content').forEach(content => {
        content.classList.toggle('active', content.id === `content-${role}`);
      });

      helpcurrentRole = role;
    }

    function toggleSection(header, contentId) {
      const content = document.getElementById(contentId);
      header.classList.toggle('expanded');
      header.classList.toggle('collapsed');
      content.classList.toggle('show');

      // Persist state
      const key = `help_section_${contentId}`;
      sessionStorage.setItem(key, content.classList.contains('show'));
    }

    function toggleFaq(question, itemId) {
      const item = document.getElementById(itemId);
      const answer = item.querySelector('.help-faq-answer');
      item.classList.toggle('open');
      answer.classList.toggle('show');

      // Persist state
      const key = `help_faq_${itemId}`;
      sessionStorage.setItem(key, item.classList.contains('open'));
    }

    function filterContent(query) {
      if (!query.trim()) {
        document.querySelectorAll('[id^="guide-"], [id^="faq-"]').forEach(el => {
          el.parentElement.style.display = '';
        });
        return;
      }

      const lowerQuery = query.toLowerCase();
      document.querySelectorAll('[id^="guide-"], [id^="faq-"]').forEach(el => {
        const text = el.textContent.toLowerCase();
        const isMatch = text.includes(lowerQuery);
        el.parentElement.style.display = isMatch ? '' : 'none';
      });

      // Check if no results
      const activeContent = document.querySelector('.help-content.active');
      const visibleItems = activeContent.querySelectorAll('[id^="guide-"], [id^="faq-"]').length;
      const visibleMatches = Array.from(activeContent.querySelectorAll('[id^="guide-"], [id^="faq-"]')).filter(el => el.parentElement.style.display !== 'none').length;

      if (visibleMatches === 0 && query.trim()) {
        activeContent.innerHTML += `
          <div class="help-empty">
            <i class="fas fa-search"></i>
            <p>No results found for "<strong>${query}</strong>"</p>
          </div>
        `;
      }
    }

    function resetSearch() {
      document.getElementById('helpSearch').value = '';
      filterContent('');
      const empty = document.querySelector('.help-empty');
      if (empty) empty.remove();
    }

    // Page load listener for dashboard hash routing
    document.addEventListener('page:loaded', function (e) {
      if (e?.detail?.page === 'help') {
        init();
      }
    });

    // Initialize on direct load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
